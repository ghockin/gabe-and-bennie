<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bennie & Gabe Wedding</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <h1>Bennie & Gabe</h1>
    <p>30 September 2027</p>
    <nav>
      <a href="#rsvp">RSVP</a>
      <a href="#qr">QR Code</a>
    </nav>
  </header>

  <section class="hero">
    <div class="overlay"></div>
    <div class="hero-content">
      <h2>Welcome to Our Celebration</h2>
      <p>Join us as we celebrate our special day!</p>
      <a href="#rsvp" class="btn">RSVP Now</a>
    </div>
  </section>

  <section id="rsvp" class="section">
    <h3>RSVP</h3>
    <p>Let us know if you’ll be there!</p>
    <!-- Add a form here if desired -->
  </section>

  <section id="qr" class="section qr-section">
    <h3>Scan to RSVP</h3>
    <p>Download this image of the qr code for your letter invitaions</p>
    <img src="qr-code.png" alt="QR Code">
  </section>

  <footer>
    <p>&copy; 2027 Bennie & Gabe</p>
  </footer>

  <!-- Smooth scrolling script -->
  <script>
    document.querySelectorAll('a[href^="#"]').forEach(anchor => {
      anchor.addEventListener('click', function(e) {
        e.preventDefault();
        document.querySelector(this.getAttribute('href'))
          .scrollIntoView({ behavior: 'smooth' });
      });
    });
  </script>
</body>
</html>
